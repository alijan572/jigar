<!DOCTYPE html>
<html lang="tg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Барои Фариза хони ман 🌸</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Arial', sans-serif;
            background: linear-gradient(145deg, #2d1b2e 0%, #4a2c3f 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Парящие сердечки */
        .hearts-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .floating-heart {
            position: absolute;
            font-size: 20px;
            opacity: 0.3;
            animation: floatUp 10s infinite ease-in;
            color: #ff99cc;
            user-select: none;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(100vh) rotate(0deg) scale(0.7);
                opacity: 0;
            }
            10% {
                opacity: 0.35;
            }
            90% {
                opacity: 0.25;
            }
            100% {
                transform: translateY(-10vh) rotate(45deg) scale(1.3);
                opacity: 0;
            }
        }

        .card {
            position: relative;
            z-index: 2;
            max-width: 550px;
            width: 100%;
            background: rgba(255, 240, 245, 0.9);
            backdrop-filter: blur(20px);
            background: linear-gradient(135deg, rgba(255,235,245,0.95) 0%, rgba(255,220,230,0.9) 100%);
            border-radius: 55px;
            padding: 35px 25px 35px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.35), 0 0 0 2px rgba(255, 192, 203, 0.6), inset 0 2px 15px rgba(255,255,255,0.9);
            text-align: center;
            transition: 0.3s;
        }

        h1 {
            font-size: 2.6rem;
            font-weight: 700;
            color: #a8324e;
            margin-bottom: 5px;
            text-shadow: 1px 1px 0 white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .subtitle {
            color: #b3405a;
            font-style: italic;
            margin-bottom: 25px;
            font-size: 1.2rem;
            border-bottom: 2px dashed #f3a3b9;
            padding-bottom: 10px;
            display: inline-block;
        }

        .button-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            margin: 15px 0 20px;
        }

        .love-btn {
            background: #ffffff;
            border: none;
            padding: 14px 20px;
            border-radius: 100px;
            font-size: 1.1rem;
            font-weight: 600;
            color: #5c1e2e;
            background: linear-gradient(180deg, #fff6f9 0%, #ffe4ec 100%);
            box-shadow: 0 8px 16px rgba(150, 30, 60, 0.2), 0 2px 5px rgba(0,0,0,0.08), inset 0 1px 0 white;
            cursor: pointer;
            transition: 0.2s ease;
            display: flex;
            align-items: center;
            gap: 6px;
            border: 1px solid rgba(255, 140, 170, 0.5);
            flex: 1 1 auto;
            justify-content: center;
            backdrop-filter: blur(5px);
        }

        .love-btn:hover {
            background: #fff0f3;
            box-shadow: 0 12px 25px rgba(180, 40, 70, 0.35), 0 0 0 2px rgba(255, 105, 135, 0.6);
            transform: translateY(-3px);
            color: #b0304b;
        }

        .love-btn:active {
            transform: translateY(2px);
            box-shadow: 0 4px 10px rgba(140, 20, 50, 0.3);
        }

        .display-area {
            background: rgba(255, 248, 250, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 40px;
            padding: 25px 20px;
            margin: 15px 0 10px;
            min-height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            border: 1px solid rgba(255, 175, 190, 0.8);
            box-shadow: inset 0 0 30px rgba(255, 192, 203, 0.6);
            transition: all 0.4s;
            color: #4a1e2b;
            font-size: 1.4rem;
            font-weight: 500;
            position: relative;
            overflow: hidden;
        }

        .flower-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        /* CSS-цветок (роза) */
        .flower {
            position: relative;
            width: 100px;
            height: 100px;
            margin-bottom: 20px;
            animation: appear 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        @keyframes appear {
            0% {
                transform: scale(0) rotate(0deg);
                opacity: 0;
            }
            70% {
                transform: scale(1.15) rotate(10deg);
                opacity: 1;
            }
            100% {
                transform: scale(1) rotate(0deg);
                opacity: 1;
            }
        }

        .petal {
            position: absolute;
            width: 40px;
            height: 50px;
            background: radial-gradient(circle at 30% 20%, #ff7eb3, #e8436e);
            border-radius: 50%;
            top: 25px;
            left: 30px;
            transform-origin: center bottom;
            opacity: 0.9;
            box-shadow: 0 0 12px #ff4d7a;
            animation: petalGrow 0.6s ease-out forwards;
            opacity: 0;
            transform: scale(0);
        }

        @keyframes petalGrow {
            0% {
                opacity: 0;
                transform: scale(0) rotate(0deg);
            }
            100% {
                opacity: 0.9;
                transform: scale(1) rotate(var(--angle));
            }
        }

        .petal:nth-child(1) { --angle: 0deg; animation-delay: 0.1s; }
        .petal:nth-child(2) { --angle: 45deg; animation-delay: 0.2s; }
        .petal:nth-child(3) { --angle: 90deg; animation-delay: 0.3s; }
        .petal:nth-child(4) { --angle: 135deg; animation-delay: 0.4s; }
        .petal:nth-child(5) { --angle: 180deg; animation-delay: 0.5s; }
        .petal:nth-child(6) { --angle: 225deg; animation-delay: 0.6s; }
        .petal:nth-child(7) { --angle: 270deg; animation-delay: 0.7s; }
        .petal:nth-child(8) { --angle: 315deg; animation-delay: 0.8s; }

        .center {
            position: absolute;
            width: 24px;
            height: 24px;
            background: #ffd966;
            border-radius: 50%;
            top: 38px;
            left: 38px;
            box-shadow: 0 0 18px #ffaa00;
            z-index: 2;
            animation: centerPop 0.5s 0.4s ease-out both;
        }

        @keyframes centerPop {
            0% { transform: scale(0); }
            80% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        .message-text {
            font-size: 1.6rem;
            font-weight: 700;
            color: #a12740;
            font-style: italic;
            text-align: center;
            margin-top: 5px;
        }

        .extra-glow {
            box-shadow: 0 0 35px #ffb6c1, inset 0 0 30px #ffd0da;
        }

        .secret-hint {
            font-size: 0.8rem;
            color: #b85c6e;
            margin-top: 18px;
            opacity: 0.85;
            letter-spacing: 0.3px;
        }

        @media (max-width: 450px) {
            .love-btn {
                font-size: 0.9rem;
                padding: 12px 12px;
            }
            h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
<div class="hearts-bg" id="heartsContainer"></div>

<div class="card">
    <h1>
        <span>🌸</span> Фариза хони ман <span>🌸</span>
    </h1>
    <div class="subtitle">ту гултарин дар дили манӣ</div>

    <div class="button-grid">
        <button class="love-btn" id="btnFlower">🌸 Гул кушодан</button>
        <button class="love-btn" id="btnCompliment">💬 Таърифи зебо</button>
        <button class="love-btn" id="btnHug">🤗 Оғӯши гарм</button>
        <button class="love-btn" id="btnSurprise">🎁 Сюрприз</button>
    </div>

    <div class="display-area" id="displayBox">
        <div class="flower-container" id="flowerContainer">
            <!-- здесь появится цветок -->
            <div id="dynamicFlower" style="display: none;"></div>
            <div class="message-text" id="displayMessage">Тугмаро пахш кун... 💖</div>
        </div>
    </div>

    <div class="secret-hint">
        ✨ Рамз: дар клавиатура <strong>ФАРИЗА</strong>-ро нависед (ҳарфҳои калон)
    </div>
</div>

<script>
    (function() {
        // ---------- Фоновые сердечки ----------
        const heartsContainer = document.getElementById('heartsContainer');
        function createBackgroundHeart() {
            const heart = document.createElement('div');
            heart.className = 'floating-heart';
            const symbols = ['💖', '💕', '💗', '✨', '🌸', '🕊️', '💘'];
            heart.textContent = symbols[Math.floor(Math.random() * symbols.length)];
            heart.style.left = Math.random() * 100 + '%';
            heart.style.animationDuration = Math.random() * 8 + 7 + 's';
            heart.style.fontSize = (Math.random() * 20 + 14) + 'px';
            heartsContainer.appendChild(heart);
            setTimeout(() => {
                if (heart && heart.parentNode) heart.remove();
            }, 13000);
        }
        setInterval(createBackgroundHeart, 600);
        for (let i = 0; i < 10; i++) {
            setTimeout(() => createBackgroundHeart(), i * 150);
        }

        // ---------- DOM-элементы ----------
        const displayMessage = document.getElementById('displayMessage');
        const dynamicFlower = document.getElementById('dynamicFlower');
        const displayBox = document.getElementById('displayBox');

        // Убираем старый цветок, если есть
        function clearFlower() {
            dynamicFlower.innerHTML = '';
            dynamicFlower.style.display = 'none';
        }

        // Создать HTML-розу
        function createFlowerHTML() {
            let petals = '';
            for (let i = 1; i <= 8; i++) {
                petals += `<div class="petal"></div>`;
            }
            return `<div class="flower">${petals}<div class="center"></div></div>`;
        }

        // Показать цветок + сообщение
        function showFlowerAndMessage(mainText, extraHTML = '') {
            clearFlower();
            dynamicFlower.innerHTML = createFlowerHTML();
            dynamicFlower.style.display = 'block';
            displayMessage.innerHTML = mainText + (extraHTML ? '<br>' + extraHTML : '');
            displayBox.classList.add('extra-glow');
            setTimeout(() => displayBox.classList.remove('extra-glow'), 700);
        }

        // Просто сообщение без цветка
        function showMessageOnly(mainText, extraHTML = '') {
            clearFlower();
            displayMessage.innerHTML = mainText + (extraHTML ? '<br>' + extraHTML : '');
            displayBox.classList.add('extra-glow');
            setTimeout(() => displayBox.classList.remove('extra-glow'), 500);
        }

        // ---------- Комплименты и сообщения (таджикский) ----------
        const compliments = [
            "Ту зеботарин гул дар боғи зиндагии манӣ 🌹",
            "Лабханди ту аз офтоб равшантар аст ☀️",
            "Чашмони ту мисли ситораҳои осмонанд ✨",
            "Ҳар лаҳза бо ту як тӯҳфаи илоҳӣ аст",
            "Ту сабаби табассуми ҳаррӯзаи манӣ",
            "Фариза, ту орзуи ширини манӣ, ки амалӣ шуд",
            "Дили ман танҳо барои ту метапад 💓",
            "Ту нозуктарин ва меҳрубонтарин инсони дунёӣ"
        ];

        const hugMessages = [
            "Туро сахт-сахт оғӯш мекунам! Ҳис мекунӣ? 🤗💗",
            "Миллион оғӯши гарм ба сӯят мефиристам!",
            "Оғӯши ман туро аз ҳама ташвишҳо халос мекунад.",
            "Оғӯши виртуалӣ, ки ба зудӣ воқеӣ мешавад. Дӯстат медорам!"
        ];

        // ---------- Кнопки ----------
        document.getElementById('btnFlower').addEventListener('click', () => {
            showFlowerAndMessage('Ин гул барои ту, азизам 🌸', 'Ту аз ҳама гулҳо зеботарӣ!');
        });

        document.getElementById('btnCompliment').addEventListener('click', () => {
            const randomComp = compliments[Math.floor(Math.random() * compliments.length)];
            showMessageOnly(randomComp, '💕');
        });

        document.getElementById('btnHug').addEventListener('click', () => {
            const randomHug = hugMessages[Math.floor(Math.random() * hugMessages.length)];
            showMessageOnly(randomHug, '🫂🤍');
        });

        document.getElementById('btnSurprise').addEventListener('click', () => {
            showFlowerAndMessage('🎀 Ту сазовори тамоми дунёӣ!', 'Ман бароят як шоми вижа тайёр кардам...');
        });

        // ---------- Пасхалка: ввод "ФАРИЗА" ----------
        const secretCode = ['Ф', 'А', 'Р', 'И', 'З', 'А'];
        let inputBuffer = [];

        window.addEventListener('keydown', function(e) {
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.isContentEditable) return;
            const key = e.key.toUpperCase(); // приводим к заглавным
            if (secretCode.includes(key)) {
                inputBuffer.push(key);
                if (inputBuffer.length > secretCode.length) {
                    inputBuffer.shift();
                }
                if (inputBuffer.join('') === secretCode.join('')) {
                    // Особая реакция
                    showFlowerAndMessage('💖 Фариза, ту ҳама чизи манӣ! 💖', 'Ман туро бештар аз ҳар чиз дӯст медорам. Ту ҷони манӣ.');
                    // Дополнительные сердечки
                    for (let i = 0; i < 18; i++) {
                        setTimeout(() => {
                            const heart = document.createElement('div');
                            heart.className = 'floating-heart';
                            heart.textContent = '💖';
                            heart.style.left = (30 + Math.random() * 40) + '%';
                            heart.style.animationDuration = '3s';
                            heart.style.fontSize = '26px';
                            heart.style.opacity = '1';
                            heart.style.color = '#ff1a4b';
                            heartsContainer.appendChild(heart);
                            setTimeout(() => { if(heart.parentNode) heart.remove(); }, 3500);
                        }, i * 80);
                    }
                    inputBuffer = [];
                }
            } else {
                inputBuffer = [];
            }
        });

        // Начальная установка
        displayMessage.textContent = 'Тугмаро пахш кун... 💖';
    })();
</script>
</body>
</html>
